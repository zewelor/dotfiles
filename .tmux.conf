set-option -g prefix C-a

# Catppuccin window text: #W shows command name; workmux status icons append automatically.
# Must be set BEFORE loading catppuccin (per catppuccin docs).
set -g @catppuccin_window_text ' #W#{?@workmux_status, #{@workmux_status},}'
set -g @catppuccin_window_current_text ' #W#{?@workmux_status, #{@workmux_status},}'

# Catppuccin theme (submodule: .config/tmux/plugins/catppuccin/tmux)
set -g @catppuccin_flavor "latte"
set -g @catppuccin_window_status_style "rounded"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# start window numbers at 1 to match keyboard order with tmux window order
# set -g base-index 1
# set-window-option -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

bind-key C-a last-window
bind -r Space next-window
bind -r C-Space next-window
bind-key k confirm-before kill-pane
bind-key K confirm-before kill-window

# Visual select and copy
# bind-key -t vi-copy 'v' begin-selection
# bind-key -t vi-copy 'y' copy-selection

# bind -n Pageup copy-mode -u
# bind -n S-Pageup copy-mode -u
# bind -n S-Pagedown send-keys Pagedown

setw -g aggressive-resize on
set -g history-limit 100000

# Terminal/Truecolor: pick best TERM and advertise 24-bit color to apps
# Prefer tmux-256color if terminfo exists; otherwise fall back to screen-256color
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'

# Tell tmux/apps that truecolor (24-bit) is supported.
# RGB is recognized by tmux >= 3.2; Tc by older tmux.
set -as terminal-overrides ",*:RGB"

# Better integration with modern TUI apps (e.g., Neovim)
set -g focus-events on
set -g set-clipboard on

set-window-option -g mode-keys vi

bind P paste-buffer
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi V     send-keys -X select-line
bind-key -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Sensible defaults (originally from tmux-sensible plugin, now explicit)
# https://github.com/tmux-plugins/tmux-sensible
set -s escape-time 0        # no delay after Esc — critical for vim/neovim insert→normal
set -g display-time 2000    # show tmux messages 2s instead of default 0.75s
set -g status-keys vi       # vi keys in command prompt (prefix + :)
set -g focus-events on      # enable focus-in/focus-out for neovim plugins/autoread
set -g aggressive-resize on # better resize when multiple clients attach to one session

# status bar: minimal
set -g status-interval 1    # refresh every 1s for responsive automatic-rename
set -g status-left ' '     # padding so windows don't hug the left edge
set -g status-right ''

# bell
set-window-option -g window-status-bell-style fg=white,bg=red #base2, red
set -g monitor-bell on
set -g bell-action other
set -g visual-bell on

# Jump to first window with bell alert (prefix + b)
# Workaround: tmux 3.x run-shell expands #{...} formats in current window context
# BEFORE passing command to shell, so list-windows -F "#{window_bell_flag}" returns
# the same value (current window's flag) repeated N times instead of per-window values.
# Fix: store format in env var, read it inside run-shell - then list-windows expands it.
setenv -g _BELL_FMT '#{window_bell_flag} #{window_index}'
bind-key b run-shell 'fmt=$(tmux showenv -g _BELL_FMT | cut -d= -f2-); w=$(tmux list-windows -F "$fmt" | awk "\$1==1 {print \$2; exit}"); [ -n "$w" ] && tmux select-window -t ":$w" || tmux display-message "No bell"'

# Allow applications to rename tmux windows and propagate to terminal title
set -g set-titles on
if-shell 'test -n "$SSH_CLIENT" || test -n "$SSH_CONNECTION"' \
    'set -g set-titles-string "#{pane_title} [#S]"' \
    'set -g set-titles-string "#S - TMUX"'

# Automatically rename windows based on running command
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Allow us to reload our Tmux configuration while
# using Tmux
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Swap window to left or right
bind-key -r < swap-window -t -1 -d
bind-key -r > swap-window -t +1 -d

# Workmux dashboard: prefix + C-s opens as tmux popup
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"

# Workmux: jump to last completed/waiting agent
bind l run-shell "workmux last-done"

if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'

# Taken from: https://blog.testdouble.com/posts/2016-11-18-reconciling-tmux-and-ssh-agent-forwarding/
# Remove SSH_AUTH_SOCK to disable tmux automatically resetting the variable
if-shell '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]' 'set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"'
# Use a symlink to look up SSH authentication
if-shell '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]' 'setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock'

# Forward Ctrl+/ to Ctrl-_ so terminals that don't emit C-_ still work
# Useful for Neovim 0.10+ built-in commenting mapping bound to <C-_>
bind -n C-^ send-keys C-_

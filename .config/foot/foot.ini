[main]
include=~/.config/foot/catppuccin-latte.ini
font=JetBrainsMonoNL Nerd Font Mono:size=13
initial-window-mode=maximized
pad=0x0 center-when-maximized-and-fullscreen
term=foot
selection-target=both

[bell]
system=no

[security]
osc52=copy-enabled

[mouse]
hide-when-typing=yes

[key-bindings]
clipboard-paste=Control+Shift+v XF86Paste Shift+Insert
primary-paste=none
scrollback-up-page=Shift+Page_Up Shift+KP_Page_Up Control+Page_Up Control+KP_Page_Up
scrollback-down-page=Shift+Page_Down Shift+KP_Page_Down Control+Page_Down Control+KP_Page_Down

[text-bindings]
\x1f=Control+slash
\x1b\x0d=Shift+Return
